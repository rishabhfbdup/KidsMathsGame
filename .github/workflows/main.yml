name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Inject Full Configuration & Force Accept Licenses
        run: |
          # Adhoori config ki jagah automatic poori parameters force options ke sath inject karna
          sed -i 's/.*android.accept_licenses.*/android.accept_licenses = True/' buildozer.spec || echo "android.accept_licenses = True" >> buildozer.spec
          
          # Android environment variables ko update aur accept karwana
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # SDK Tools setup karke force update lagana
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          yes | buildozer android pms --create-buildozer-dir || true

      - name: Build with Buildozer
        run: |
          # Dynamic terminal support ke sath build ko run karna
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
