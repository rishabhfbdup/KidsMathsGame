name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Config setup jo bina kisi error ke har setting inject karega
      - name: Inject Clean Configuration
        run: |
          rm -f buildozer.spec
          buildozer init
          
          # Pehle se maujood configuration settings ko customize karna
          sed -i 's/^requirements =.*/requirements = python3,pygame,hostpython3/' buildozer.spec
          sed -i 's/^title =.*/title = Kids Maths Game/' buildozer.spec
          
          # Pure license process ko pipeline ke andar bypass karne ke liye variable force add karna
          echo "android.accept_licenses = True" >> buildozer.spec

      - name: Build with Buildozer (Forced Pass)
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Buildozer run karte waqt environment options se forced binary call karna
          export BUILDOZER_ALLOW_KIVY_NEW_DESIGN=1
          buildozer -v android debug
