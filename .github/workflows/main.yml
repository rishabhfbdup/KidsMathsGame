name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # Config files me se duplicate options hatakar ekdam clean update karna
      - name: Inject Full Configuration & Auto-Accept Licenses
        run: |
          rm -f buildozer.spec
          buildozer init
          
          # Exact matching ke sath configuration lines ko overwrite karna
          sed -i 's/^#\? \?android.accept_licenses =.*/android.accept_licenses = 1/' buildozer.spec
          sed -i 's/^requirements =.*/requirements = python3,pygame,hostpython3/' buildozer.spec
          sed -i 's/^title =.*/title = Kids Maths Game/' buildozer.spec
          
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
