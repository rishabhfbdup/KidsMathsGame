name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # GitHub par pehle se maujood licenses ko forced accept karna
      - name: Pre-accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        env:
          # GitHub system ke default SDK aur NDK ka exact path Buildozer ko de rahe hain
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk-bundle
        run: |
          # Buildozer ko forced parameters ke sath run kar rahe hain
          buildozer -v android debug
