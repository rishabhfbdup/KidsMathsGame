name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # GitHub ke built-in Android SDK tools se sabhi licenses pehle hi forced accept karna
      - name: Force Accept Android Licenses & Setup Paths
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Buildozer ki default target folders pehle se banana
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          
          # GitHub system ke sdkmanager se forced licenses accept karke Buildozer me copy karna
          if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
            cp -r $ANDROID_HOME/licenses/* /home/runner/.buildozer/android/platform/android-sdk/licenses/ || true
          elif [ -d "$ANDROID_HOME/tools/bin" ]; then
            yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
            cp -r $ANDROID_HOME/licenses/* /home/runner/.buildozer/android/platform/android-sdk/licenses/ || true
          fi

      - name: Inject Clean Configuration
        run: |
          rm -f buildozer.spec
          buildozer init
          
          # buildozer.spec me basic requirements fix karna
          sed -i 's/^requirements =.*/requirements = python3,pygame,hostpython3/' buildozer.spec
          sed -i 's/^title =.*/title = Kids Maths Game/' buildozer.spec

      - name: Build with Buildozer
        run: |
          # Bina license verification ke seedhe application compile hogi
          buildozer -v android debug
