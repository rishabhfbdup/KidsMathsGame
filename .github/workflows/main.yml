name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Missing Android SDK Tools
        run: |
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools
          cd /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-9477386_latest.zip
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/tools/bin
          ln -s /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          yes | /home/runner/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Inject Pygame Bootstrap Configuration
        run: |
          rm -f buildozer.spec
          cat << 'EOF' > buildozer.spec
          [app]
          title = Kids Maths Game
          package.name = kidsmathsgame
          package.domain = org.test
          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas,ttf,wav,mp3
          version = 0.1
          
          # PYGAME CRITICAL REQUIREMENTS
          requirements = python3,pygame,kivy,android
          
          # BOOTSTRAP BACKEND FOR PYGAME RUNTIME
          p4a.bootstrap = sdl2
          
          orientation = portrait
          fullscreen = 1
          android.archs = arm64-v8a
          android.api = 33
          android.minapi = 21
          android.ndk_api = 21
          android.accept_licenses = True
          android.ndk = 25b
          EOF

      - name: Configure Git Safe Directory
        run: |
          git config --global --add safe.directory /home/runner/work/KidsMathsGame/KidsMathsGame
          git config --global --add safe.directory '*'

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
